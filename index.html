<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODS - Oyun Analiz Sistemi</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0b0f14;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: #111827;
            padding: 20px;
            border-right: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            color: #00e5a8;
            margin-top: 0;
            font-size: 24px;
            text-align: center;
        }

        #gameList {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .game {
            background: #1f2937;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .game:hover {
            background: #2b3a55;
            border-color: #00e5a8;
        }

        .game.active {
            background: #2b3a55;
            border-color: #00e5a8;
            box-shadow: 0 0 10px rgba(0, 229, 168, 0.2);
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            border: 0;
            border-radius: 10px;
            background: linear-gradient(90deg, #00c896, #00a3ff);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background: linear-gradient(90deg, #ff4b2b, #ff416c);
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
        }

        /* CHART */
        .chart-container {
            background: #111827;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #1f2937;
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }

        /* SECTION */
        .card {
            background: #111827;
            border: 1px solid #1f2937;
            padding: 20px;
            margin-top: 15px;
            border-radius: 15px;
            position: relative;
        }

        .card-header {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input, textarea {
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #374151;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            font-family: inherit;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .delete-sec {
            background: #ff4b2b;
            width: auto;
            padding: 5px 15px;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>🎮 TODS</h2>
    <div id="gameList"></div>

    <button onclick="addGame()">Oyun Ekle</button>
    <button onclick="deleteGame()" class="btn-danger">Seçili Oyunu Sil</button>
    <div style="margin-top: 20px; border-top: 1px solid #333; padding-top: 10px;">
        <button onclick="exportData()" style="background: #374151;">Dışa Aktar (Kopyala)</button>
        <button onclick="importData()" style="background: #374151;">İçe Aktar (Yapıştır)</button>
    </div>
</div>

<div class="main">
    <h1 id="title">Lütfen bir oyun seçin veya ekleyin</h1>

    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>

    <div id="actionButtons" style="display: none; gap: 10px; display: flex;">
        <button onclick="addSection()">Bölüm Ekle</button>
        <button onclick="exportPDF()" style="background: #f39c12;">PDF Raporu Oluştur</button>
    </div>

    <div id="sections"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("pacemeter")) || {};
let current = null;
let chart = null;

function save() {
    localStorage.setItem("pacemeter", JSON.stringify(data));
}

/* OYUN YÖNETİMİ */
function renderGames() {
    let el = document.getElementById("gameList");
    el.innerHTML = "";

    Object.keys(data).forEach(g => {
        let d = document.createElement("div");
        d.className = `game ${current === g ? 'active' : ''}`;
        d.innerText = g;
        d.onclick = () => selectGame(g);
        el.appendChild(d);
    });
}

function addGame() {
    let name = prompt("Yeni oyunun adını girin:");
    if (!name || data[name]) return;
    data[name] = { sections: [] };
    save();
    renderGames();
    selectGame(name);
}

function deleteGame() {
    if (!current) return;
    if (confirm(`${current} oyununu ve tüm bölümlerini silmek istediğinize emin misiniz?`)) {
        delete data[current];
        current = null;
        save();
        location.reload(); 
    }
}

function selectGame(name) {
    current = name;
    document.getElementById("title").innerText = "🎮 " + name;
    document.getElementById("actionButtons").style.display = "flex";
    renderGames();
    renderChart();
    renderSections();
}

/* GRAFİK YÖNETİMİ */
function renderChart() {
    if (!current || !data[current]) return;
    let ctx = document.getElementById("chart").getContext('2d');

    let labels = data[current].sections.map(s => s.title || "Adsız");
    let values = data[current].sections.map(s => s.value);

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: 'Bölüm Puanı',
                data: values,
                borderColor: "#00e5a8",
                backgroundColor: "rgba(0, 229, 168, 0.1)",
                borderWidth: 3,
                pointRadius: 6,
                pointHoverRadius: 8,
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                dragData: {
                    onDragEnd: (e, ds, i, val) => {
                        data[current].sections[i].value = Math.round(val);
                        save();
                        renderSections();
                    }
                }
            },
            scales: {
                y: { min: 0, max: 100, grid: { color: "#1f2937" } },
                x: { grid: { display: false } }
            }
        }
    });
}

/* BÖLÜM YÖNETİMİ */
function addSection() {
    if (!current) return;
    data[current].sections.push({
        title: "Yeni Bölüm " + (data[current].sections.length + 1),
        value: 50,
        desc: "",
        plus: "",
        minus: ""
    });
    save();
    renderChart();
    renderSections();
}

function update(i, key, val) {
    data[current].sections[i][key] = val;
    save();
    if (key === 'title' || key === 'value') renderChart();
}

function deleteSection(i) {
    data[current].sections.splice(i, 1);
    save();
    renderChart();
    renderSections();
}

function renderSections() {
    let el = document.getElementById("sections");
    el.innerHTML = "";
    if (!current || !data[current]) return;

    data[current].sections.forEach((s, i) => {
        el.innerHTML += `
        <div class="card">
            <div class="card-header">
                <input style="flex:3; font-weight:bold; color:#00e5a8;" value="${s.title}" onchange="update(${i},'title',this.value)" placeholder="Bölüm Adı">
                <input style="flex:1;" type="number" value="${s.value}" onchange="update(${i},'value',parseInt(this.value))" min="0" max="100">
                <button class="delete-sec" onclick="deleteSection(${i})">Sil</button>
            </div>
            <textarea placeholder="Genel Açıklama..." onchange="update(${i},'desc',this.value)">${s.desc}</textarea>
            <div class="grid-inputs">
                <textarea style="border-color: #27ae60;" placeholder="Artılar (+)" onchange="update(${i},'plus',this.value)">${s.plus}</textarea>
                <textarea style="border-color: #c0392b;" placeholder="Eksiler (-)" onchange="update(${i},'minus',this.value)">${s.minus}</textarea>
            </div>
        </div>
        `;
    });
}

/* DATA TRANSFER */
function exportData() {
    navigator.clipboard.writeText(JSON.stringify(data));
    alert("Tüm veriler panoya kopyalandı!");
}

function importData() {
    let raw = prompt("JSON verisini buraya yapıştırın:");
    if (!raw) return;
    try {
        data = JSON.parse(raw);
        save();
        location.reload();
    } catch (e) {
        alert("Hata: Geçersiz veri formatı!");
    }
}

/* PDF OLUŞTURMA (TÜRKÇE DESTEKLİ) */
function exportPDF() {
    if (!current || !data[current]) return;

    const element = document.createElement("div");
    element.style.padding = "20px";
    element.style.color = "#000";
    element.style.background = "#fff";
    element.style.fontFamily = "Arial, sans-serif";

    let sectionsHtml = "";
    data[current].sections.forEach((s, i) => {
        sectionsHtml += `
            <div style="margin-bottom: 30px; border: 1px solid #ddd; padding: 15px; border-radius: 10px; page-break-inside: avoid;">
                <div style="display:flex; justify-content: space-between; border-bottom: 2px solid #00c896; padding-bottom: 5px; margin-bottom: 10px;">
                    <strong style="font-size: 18px;">${i + 1}. ${s.title}</strong>
                    <span style="font-weight: bold; color: #00a3ff;">Puan: ${s.value}/100</span>
                </div>
                <p><strong>Açıklama:</strong> ${s.desc || "-"}</p>
                <div style="display: flex; gap: 20px; margin-top: 10px;">
                    <div style="flex: 1; color: #27ae60;"><strong>Artılar:</strong><br>${(s.plus || "-").replace(/\n/g, '<br>')}</div>
                    <div style="flex: 1; color: #c0392b;"><strong>Eksiler:</strong><br>${(s.minus || "-").replace(/\n/g, '<br>')}</div>
                </div>
            </div>
        `;
    });

    element.innerHTML = `
        <div style="text-align: center; margin-bottom: 20px; background: #111827; color: #fff; padding: 20px; border-radius: 10px;">
            <h1 style="margin: 0;">${current}</h1>
            <p>Oyun Performans ve Analiz Raporu</p>
        </div>
        <div style="margin-bottom: 30px; text-align: center;">
            <img src="${document.getElementById("chart").toDataURL("image/png")}" style="width: 100%; border: 1px solid #ddd; border-radius: 10px;">
        </div>
        ${sectionsHtml}
    `;

    const opt = {
        margin: 10,
        filename: `${current}_Analiz_Raporu.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}

window.onload = () => {
    renderGames();
    let keys = Object.keys(data);
    if (keys.length > 0) selectGame(keys[0]);
};
</script>

</body>
</html>
